services:

  # ─── Next.js App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: vintage_app
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      DATABASE_URL:          postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET:       ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:          ${NEXTAUTH_URL}
      DEEPSEEK_API_KEY:      ${DEEPSEEK_API_KEY}
      BREVO_API_KEY:         ${BREVO_API_KEY}
      BREVO_SENDER_EMAIL:    ${BREVO_SENDER_EMAIL}
      N8N_KONTAKT_WEBHOOK_URL: ${N8N_KONTAKT_WEBHOOK_URL}
      NEXT_PUBLIC_APP_URL:   ${NEXTAUTH_URL}
      UPLOAD_DIR:            /app/uploads
    volumes:
      - uploads:/app/uploads
    networks:
      - vintage_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval:     30s
      timeout:      10s
      start_period: 40s
      retries:      3

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: vintage_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=de_DE.UTF-8"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro   # SQL-Dateien werden beim ersten Start ausgeführt
    networks:
      - vintage_net
    # Nur lokal erreichbar (kein direkter Zugriff von außen)
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ─── N8N Workflow-Engine ─────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: vintage_n8n
    restart: unless-stopped
    environment:
      N8N_HOST:              ${N8N_HOST:-n8n.vintage-market.de}
      N8N_PORT:              5678
      N8N_PROTOCOL:          https
      WEBHOOK_URL:           https://${N8N_HOST:-n8n.vintage-market.de}
      # N8N nutzt dieselbe PostgreSQL (eigenes Schema "n8n")
      DB_TYPE:               postgresdb
      DB_POSTGRESDB_HOST:    db
      DB_POSTGRESDB_PORT:    5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER:    ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_POSTGRESDB_SCHEMA:  n8n
      GENERIC_TIMEZONE:      Europe/Berlin
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER:   ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_LOG_LEVEL:         warn
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 336   # 14 Tage in Stunden
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vintage_net
    depends_on:
      db:
        condition: service_healthy

  # ─── Caddy TLS Reverse Proxy ─────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: vintage_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 via QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - vintage_net
    depends_on:
      - app
      - n8n

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  uploads:
    driver: local
  n8n_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  vintage_net:
    driver: bridge
